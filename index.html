<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 감정일기</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-top">
                <div class="profile-img"></div>
                <h1 class="app-title">Mind Pieces</h1>
                <span class="material-symbols-rounded settings-icon">settings</span>
            </div>
        </header>

        <main class="main-content">
            <div class="date-display" id="currentDate">MONDAY, OCT 23</div>
            <!-- 요청하신 제목 적용 -->
            <h2 class="main-question">오늘 하루는 어땠나요?</h2>

            <div class="input-section">
                <textarea id="diaryInput" placeholder="말하고 싶은 이야기가 있나요?"></textarea>
            </div>

            <div class="action-buttons">
                <button class="btn voice-btn" id="voiceBtn">
                    <span class="material-symbols-rounded">mic</span>
                    <span class="btn-label">음성 입력하기</span>
                </button>
                <button class="btn ai-btn" id="aiBtn">
                    <span class="material-symbols-rounded">psychology</span>
                    AI 상담사
                </button>
            </div>

            <div class="response-section" id="responseBox">
                <div class="response-header">
                    <div class="icon-wrapper">
                        <span class="material-symbols-rounded">auto_awesome</span>
                    </div>
                    <h3>AI 상담사</h3>
                </div>
                <p class="response-content" id="responseContent">
                    일기를 작성하면 AI 상담사의 따뜻한 답변이 여기에 나타납니다.
                </p>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
