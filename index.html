<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 감정일기</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-container">
        <!-- 로그인 화면 UI (현재는 기능 미구현, UI만 배치) -->
        <div class="login-screen" id="loginScreen">
            <div class="login-content">
                <div class="login-logo">
                    <span class="material-symbols-rounded">psychiatry</span>
                </div>
                <h1 class="login-title">Mind Pieces</h1>
                <p class="login-subtitle">당신의 감정을 기록하고<br>AI와 따뜻한 대화를 나누어보세요.</p>

                <form class="login-form" id="authForm" onsubmit="event.preventDefault();">
                    <div class="input-group">
                        <span class="material-symbols-rounded">mail</span>
                        <input type="email" id="emailInput" placeholder="이메일 주소" required>
                    </div>
                    <div class="input-group">
                        <span class="material-symbols-rounded">lock</span>
                        <input type="password" id="passwordInput" placeholder="비밀번호" required>
                    </div>
                    <button type="submit" class="login-submit-btn" id="authSubmitBtn">이메일로 로그인</button>
                    
                    <div class="auth-toggle" style="text-align: center; margin-top: 12px;">
                        <span id="authToggleText" style="color: #a0a5ba; font-size: 0.85rem;">계정이 없으신가요?</span>
                        <button type="button" id="authToggleBtn" style="background: none; border: none; color: var(--primary-color); font-weight: 600; font-size: 0.85rem; cursor: pointer; margin-left: 4px;">회원가입</button>
                    </div>
                    <p id="authErrorMessage" class="error-msg" style="display:none; margin-top: 8px; text-align: center; font-size: 0.85rem;"></p>
                </form>

                <div class="login-divider">
                    <span>또는</span>
                </div>

                <button type="button" class="btn-google" id="googleLoginBtn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo">
                    Google 계정으로 계속하기
                </button>
            </div>
        </div>
        <header class="header">
            <div class="header-top">
                <div class="profile-img"></div>
                <h1 class="app-title">Mind Pieces</h1>
                <div class="header-icons">
                    <span class="material-symbols-rounded" id="logoutBtn" title="로그아웃" style="display: none; cursor: pointer; color: var(--text-muted); transition: color 0.2s;">logout</span>
                    <span class="material-symbols-rounded settings-icon">settings</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="date-display" id="currentDate">MONDAY, OCT 23</div>
            <!-- 요청하신 제목 적용 -->
            <h2 class="main-question">오늘 하루는 어땠나요?</h2>

            <div class="input-section">
                <textarea id="diaryInput" placeholder="말하고 싶은 이야기가 있나요?"></textarea>
            </div>

            <div class="action-buttons">
                <button class="btn voice-btn" id="voiceBtn">
                    <span class="material-symbols-rounded">mic</span>
                    <span class="btn-label">음성 입력</span>
                </button>
                <button class="btn ai-btn" id="aiBtn">
                    <span class="material-symbols-rounded">psychology</span>
                    <span>AI 상담사</span>
                </button>
                <button class="btn history-btn" id="historyBtn">
                    <span class="material-symbols-rounded">view_timeline</span>
                    <span>일기 목록</span>
                </button>
            </div>

            <div class="response-section" id="responseBox">
                <div class="response-header">
                    <div class="icon-wrapper">
                        <span class="material-symbols-rounded">auto_awesome</span>
                    </div>
                    <h3>AI 상담사</h3>
                </div>
                <p class="response-content" id="responseContent">
                    일기를 작성하면 AI 상담사의 따뜻한 답변이 여기에 나타납니다.
                </p>
            </div>
        </main>

        <!-- 타임라인 모달 -->
        <div class="timeline-modal" id="timelineModal">
            <div class="timeline-content">
                <div class="timeline-header">
                    <h2>나의 감정 기록</h2>
                    <span class="material-symbols-rounded close-modal" id="closeModal">close</span>
                </div>
                <div class="timeline-list" id="timelineList">
                    <div class="loading-spinner" id="timelineLoading" style="display: none;">
                        <span class="material-symbols-rounded">autorenew</span>
                        <p>기록을 불러오는 중...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
